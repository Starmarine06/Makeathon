<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Trading AI Pro</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #d1d4dc;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(38,166,154,0.05), rgba(239,83,80,0.05), rgba(103,126,234,0.05));
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -1;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .header {
            background: rgba(30, 34, 45, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(103, 126, 234, 0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .symbol-info {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        
        .symbol-name {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 10px rgba(103, 126, 234, 0.5);
        }
        
        .price-info {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        
        .price {
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 0 20px currentColor;
            transition: all 0.3s ease;
        }
        
        .price.up { 
            color: #26a69a;
            animation: priceUp 0.5s ease;
        }
        
        .price.down { 
            color: #ef5350;
            animation: priceDown 0.5s ease;
        }
        
        @keyframes priceUp {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes priceDown {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }
        
        .change {
            font-size: 16px;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .change.up { 
            background: linear-gradient(135deg, #26a69a 0%, #1e8e82 100%);
            color: #fff;
            animation: pulseGreen 2s infinite;
        }
        
        .change.down { 
            background: linear-gradient(135deg, #ef5350 0%, #d32f2f 100%);
            color: #fff;
            animation: pulseRed 2s infinite;
        }
        
        @keyframes pulseGreen {
            0%, 100% { box-shadow: 0 4px 15px rgba(38, 166, 154, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(38, 166, 154, 0.6); }
        }
        
        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 4px 15px rgba(239, 83, 80, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(239, 83, 80, 0.6); }
        }
        
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .symbol-input {
            padding: 10px 16px;
            background: rgba(42, 46, 57, 0.9);
            border: 2px solid rgba(103, 126, 234, 0.3);
            border-radius: 10px;
            color: #d1d4dc;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            width: 120px;
            transition: all 0.3s ease;
        }
        
        .symbol-input:focus {
            outline: none;
            border-color: #677eea;
            box-shadow: 0 0 25px rgba(103, 126, 234, 0.4);
        }
        
        .signal-badge {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        
        .signal-badge.buy { 
            background: linear-gradient(135deg, #26a69a 0%, #1e8e82 100%);
            color: #fff;
            animation: buyPulse 1.5s ease-in-out infinite;
        }
        
        .signal-badge.sell { 
            background: linear-gradient(135deg, #ef5350 0%, #d32f2f 100%);
            color: #fff;
            animation: sellPulse 1.5s ease-in-out infinite;
        }
        
        .signal-badge.hold { 
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            color: #fff;
        }
        
        @keyframes buyPulse {
            0%, 100% { 
                box-shadow: 0 6px 25px rgba(38, 166, 154, 0.4);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 6px 35px rgba(38, 166, 154, 0.7);
                transform: scale(1.05);
            }
        }
        
        @keyframes sellPulse {
            0%, 100% { 
                box-shadow: 0 6px 25px rgba(239, 83, 80, 0.4);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 6px 35px rgba(239, 83, 80, 0.7);
                transform: scale(1.05);
            }
        }
        
        .signal-count {
            font-size: 13px;
            color: #26a69a;
            background: rgba(38, 166, 154, 0.15);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid rgba(38, 166, 154, 0.3);
        }
        
        #chart {
            width: 100%;
            height: calc(100vh - 140px);
            background: rgba(30, 34, 45, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
        }
        
        .stats-bar {
            background: rgba(30, 34, 45, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            display: flex;
            gap: 35px;
            border-top: 2px solid rgba(103, 126, 234, 0.3);
            font-size: 14px;
            position: fixed;
            bottom: 0;
            width: 100%;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        
        .stat-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .stat-label {
            color: #787b86;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
        }
        
        .stat-value {
            font-weight: 700;
            color: #d1d4dc;
            font-size: 15px;
        }
        
        .legend {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(30, 34, 45, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid rgba(103, 126, 234, 0.3);
            z-index: 10;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        
        .legend-title {
            font-size: 13px;
            font-weight: 700;
            color: #677eea;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .legend-item:last-child {
            margin-bottom: 0;
        }
        
        .legend-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: bold;
        }
        
        .legend-icon.buy {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            animation: glowGreen 2s infinite;
        }
        
        .legend-icon.sell {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            animation: glowRed 2s infinite;
        }
        
        @keyframes glowGreen {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.8); }
        }
        
        @keyframes glowRed {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }
            50% { box-shadow: 0 0 25px rgba(255, 68, 68, 0.8); }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 20, 25, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .loading-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(103, 126, 234, 0.2);
            border-top-color: #677eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <div class="header">
        <div class="symbol-info">
            <div class="symbol-name" id="symbolName">📊 AAPL</div>
            <div class="price-info">
                <div class="price" id="price">Loading...</div>
                <div class="change" id="change">--</div>
            </div>
        </div>
        <div class="controls">
            <input type="text" class="symbol-input" id="symbolInput" value="AAPL" placeholder="Symbol">
            <div class="signal-badge hold" id="signal">⚪ HOLD</div>
            <div class="signal-count" id="signalCount">0 signals</div>
        </div>
    </div>
    
    <div id="chart"></div>
    
    <div class="legend">
        <div class="legend-title">🎯 TRADING SIGNALS</div>
        <div class="legend-item">
            <div class="legend-icon buy">▲</div>
            <span>BUY (Strong Uptrend)</span>
        </div>
        <div class="legend-item">
            <div class="legend-icon sell">▼</div>
            <span>SELL (Strong Downtrend)</span>
        </div>
    </div>
    
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">High</span>
            <span class="stat-value" id="dayHigh">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Low</span>
            <span class="stat-value" id="dayLow">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Volume</span>
            <span class="stat-value" id="volume">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">ML Confidence</span>
            <span class="stat-value" id="mlConf">--</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Updated</span>
            <span class="stat-value" id="timestamp">--</span>
        </div>
    </div>

    <script>
        let chart;
        let candlestickSeries;
        let currentSymbol = 'AAPL';
        let updateInterval;
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('active', show);
        }
        
        function initChart() {
            const chartContainer = document.getElementById('chart');
            
            chart = LightweightCharts.createChart(chartContainer, {
                width: chartContainer.clientWidth,
                height: chartContainer.clientHeight,
                layout: {
                    background: { color: 'transparent' },
                    textColor: '#d1d4dc',
                },
                grid: {
                    vertLines: { 
                        color: 'rgba(42, 46, 57, 0.5)',
                        style: LightweightCharts.LineStyle.Dotted,
                    },
                    horzLines: { 
                        color: 'rgba(42, 46, 57, 0.5)',
                        style: LightweightCharts.LineStyle.Dotted,
                    },
                },
                timeScale: {
                    borderColor: 'rgba(103, 126, 234, 0.3)',
                    timeVisible: true,
                },
                rightPriceScale: {
                    borderColor: 'rgba(103, 126, 234, 0.3)',
                    scaleMargins: {
                        top: 0.1,
                        bottom: 0.1,
                    },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: {
                        color: '#677eea',
                        width: 2,
                        style: LightweightCharts.LineStyle.Solid,
                        labelBackgroundColor: '#677eea',
                    },
                    horzLine: {
                        color: '#677eea',
                        width: 2,
                        style: LightweightCharts.LineStyle.Solid,
                        labelBackgroundColor: '#677eea',
                    },
                },
            });
            
            candlestickSeries = chart.addCandlestickSeries({
                upColor: '#00ff88',
                downColor: '#ff4444',
                borderUpColor: '#00ff88',
                borderDownColor: '#ff4444',
                wickUpColor: '#00ff88',
                wickDownColor: '#ff4444',
            });
            
            window.addEventListener('resize', () => {
                chart.applyOptions({
                    width: chartContainer.clientWidth,
                    height: chartContainer.clientHeight
                });
            });
        }
        
        async function loadHistoricalData() {
            try {
                showLoading(true);
                console.log('Loading data for', currentSymbol);
                
                const response = await fetch(`/api/historical/${currentSymbol}`);
                const data = await response.json();
                
                if (data.error) {
                    console.error(data.error);
                    document.getElementById('signalCount').textContent = '❌ ' + data.error;
                    showLoading(false);
                    return;
                }
                
                console.log('Loaded', data.candlestick_data.length, 'candles');
                console.log('Found', data.markers.length, 'signals');
                
                candlestickSeries.setData(data.candlestick_data);
                
                // Enhanced markers with better styling
                if (data.markers && data.markers.length > 0) {
                    const enhancedMarkers = data.markers.map(marker => ({
                        ...marker,
                        color: marker.shape === 'arrowUp' ? '#00ff88' : '#ff4444',
                        size: 3,  // Larger markers
                    }));
                    candlestickSeries.setMarkers(enhancedMarkers);
                }
                
                chart.timeScale().fitContent();
                updateUI(data);
                startLiveUpdates();
                showLoading(false);
                
            } catch (error) {
                console.error('Error:', error);
                showLoading(false);
            }
        }
        
        function updateUI(data) {
            document.getElementById('symbolName').textContent = `📊 ${data.symbol}`;
            document.getElementById('price').textContent = `$${data.price || data.current_price}`;
            
            const priceEl = document.getElementById('price');
            const changeEl = document.getElementById('change');
            
            if (data.change >= 0) {
                priceEl.className = 'price up';
                changeEl.className = 'change up';
                changeEl.textContent = `▲ +${data.change_pct.toFixed(2)}%`;
            } else {
                priceEl.className = 'price down';
                changeEl.className = 'change down';
                changeEl.textContent = `▼ ${data.change_pct.toFixed(2)}%`;
            }
            
            if (data.signal) {
                const signalEl = document.getElementById('signal');
                if (data.signal === 'BUY') {
                    signalEl.className = 'signal-badge buy';
                    signalEl.textContent = '🚀 BUY SIGNAL';
                } else if (data.signal === 'SELL') {
                    signalEl.className = 'signal-badge sell';
                    signalEl.textContent = '⚠️ SELL SIGNAL';
                } else {
                    signalEl.className = 'signal-badge hold';
                    signalEl.textContent = '⚪ HOLD';
                }
            }
            
            if (data.total_signals !== undefined) {
                const modelIcon = data.has_model ? '🤖' : '📊';
                const countText = data.buy_signals && data.sell_signals 
                    ? `${modelIcon} ${data.total_signals} signals (${data.buy_signals} 🟢 ${data.sell_signals} 🔴)`
                    : `${modelIcon} ${data.total_signals} signals`;
                document.getElementById('signalCount').textContent = countText;
            }
            
            document.getElementById('dayHigh').textContent = `$${data.day_high}`;
            document.getElementById('dayLow').textContent = `$${data.day_low}`;
            document.getElementById('volume').textContent = (data.volume / 1000000).toFixed(1) + 'M';
            
            if (data.probability) {
                const conf = data.probability;
                const confEl = document.getElementById('mlConf');
                confEl.textContent = conf + '%';
                confEl.style.color = conf >= 60 ? '#00ff88' : conf <= 40 ? '#ff4444' : '#d1d4dc';
            }
            
            if (data.timestamp) {
                document.getElementById('timestamp').textContent = data.timestamp;
            }
        }
        
        async function updateLiveData() {
            try {
                const response = await fetch(`/api/live/${currentSymbol}`);
                const data = await response.json();
                if (data.error) return;
                updateUI(data);
            } catch (error) {
                console.error('Live update error:', error);
            }
        }
        
        function startLiveUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateLiveData, 5000);
        }
        
        function changeSymbol() {
            const input = document.getElementById('symbolInput');
            currentSymbol = input.value.toUpperCase().trim();
            input.value = currentSymbol;
            if (currentSymbol) {
                if (updateInterval) clearInterval(updateInterval);
                loadHistoricalData();
            }
        }
        
        document.getElementById('symbolInput').addEventListener('change', changeSymbol);
        document.getElementById('symbolInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') changeSymbol();
        });
        
        initChart();
        loadHistoricalData();
    </script>
</body>
</html>
